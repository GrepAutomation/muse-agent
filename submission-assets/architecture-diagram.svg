<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" rx="16" fill="url(#bg)" stroke="#333"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">🎬 MUSE — Architecture</text>
  <text x="550" y="64" text-anchor="middle" fill="#888" font-size="13">AI Creative Director · 5-Stage Gemini Pipeline</text>

  <!-- Input box -->
  <rect x="200" y="82" width="700" height="44" rx="8" fill="#0d0d1a" stroke="#4ecdc4" stroke-dasharray="6 3"/>
  <text x="550" y="100" text-anchor="middle" fill="#4ecdc4" font-size="10" letter-spacing="2" text-transform="uppercase">INPUT</text>
  <text x="550" y="117" text-anchor="middle" fill="#fff" font-size="13">Creative Brief (text) → "A cyberpunk short about stolen memories..."</text>

  <!-- Stage boxes -->
  <!-- Stage 1 -->
  <rect x="40" y="155" width="170" height="160" rx="12" fill="#1a1a2e" stroke="#333"/>
  <text x="125" y="178" text-anchor="middle" fill="#666" font-size="10" letter-spacing="2">STAGE 1</text>
  <text x="125" y="210" text-anchor="middle" font-size="30">📝</text>
  <text x="125" y="240" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Script</text>
  <text x="125" y="260" text-anchor="middle" fill="#4ecdc4" font-size="11" font-family="monospace">gemini-2.5-flash</text>
  <text x="125" y="280" text-anchor="middle" fill="#888" font-size="11">Structured JSON</text>
  <text x="125" y="296" text-anchor="middle" fill="#888" font-size="11">screenplay</text>

  <!-- Arrow 1 -->
  <text x="228" y="240" fill="#4ecdc4" font-size="24" font-weight="bold">→</text>

  <!-- Stage 2 -->
  <rect x="252" y="155" width="170" height="160" rx="12" fill="#1a1a2e" stroke="#333"/>
  <text x="337" y="178" text-anchor="middle" fill="#666" font-size="10" letter-spacing="2">STAGE 2</text>
  <text x="337" y="210" text-anchor="middle" font-size="30">🎨</text>
  <text x="337" y="240" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Style Bible</text>
  <text x="337" y="260" text-anchor="middle" fill="#4ecdc4" font-size="11" font-family="monospace">gemini-2.5-flash</text>
  <text x="337" y="280" text-anchor="middle" fill="#888" font-size="11">Colors · Lighting</text>
  <text x="337" y="296" text-anchor="middle" fill="#888" font-size="11">Global Lock</text>

  <!-- Arrow 2 -->
  <text x="440" y="240" fill="#4ecdc4" font-size="24" font-weight="bold">→</text>

  <!-- Stage 3 -->
  <rect x="464" y="155" width="170" height="160" rx="12" fill="#1a1a2e" stroke="#333"/>
  <text x="549" y="178" text-anchor="middle" fill="#666" font-size="10" letter-spacing="2">STAGE 3</text>
  <text x="549" y="210" text-anchor="middle" font-size="30">🖼️</text>
  <text x="549" y="240" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Storyboard</text>
  <text x="549" y="260" text-anchor="middle" fill="#4ecdc4" font-size="11" font-family="monospace">gemini-2.5-flash</text>
  <text x="549" y="280" text-anchor="middle" fill="#888" font-size="11">Frame-by-frame</text>
  <text x="549" y="296" text-anchor="middle" fill="#888" font-size="11">breakdown</text>

  <!-- Arrow 3 -->
  <text x="652" y="240" fill="#4ecdc4" font-size="24" font-weight="bold">→</text>

  <!-- Stage 4 -->
  <rect x="676" y="155" width="170" height="160" rx="12" fill="#1a1a2e" stroke="#333"/>
  <text x="761" y="178" text-anchor="middle" fill="#666" font-size="10" letter-spacing="2">STAGE 4</text>
  <text x="761" y="210" text-anchor="middle" font-size="30">🔍</text>
  <text x="761" y="240" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Review</text>
  <text x="761" y="260" text-anchor="middle" fill="#4ecdc4" font-size="11" font-family="monospace">gemini-2.5-flash</text>
  <text x="761" y="280" text-anchor="middle" fill="#888" font-size="11">Critique-correct</text>
  <text x="761" y="296" text-anchor="middle" fill="#888" font-size="11">verify loop</text>

  <!-- Arrow 4 -->
  <text x="864" y="240" fill="#4ecdc4" font-size="24" font-weight="bold">→</text>

  <!-- Stage 5 -->
  <rect x="888" y="155" width="170" height="160" rx="12" fill="#1a1a2e" stroke="#333"/>
  <text x="973" y="178" text-anchor="middle" fill="#666" font-size="10" letter-spacing="2">STAGE 5</text>
  <text x="973" y="210" text-anchor="middle" font-size="30">🖌️</text>
  <text x="973" y="240" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Images</text>
  <text x="973" y="260" text-anchor="middle" fill="#4ecdc4" font-size="11" font-family="monospace">gemini-3.1-flash</text>
  <text x="973" y="280" text-anchor="middle" fill="#888" font-size="11">Storyboard</text>
  <text x="973" y="296" text-anchor="middle" fill="#888" font-size="11">frames</text>

  <!-- Output box -->
  <rect x="200" y="340" width="700" height="44" rx="8" fill="#0d1a0d" stroke="#4ecdc4" stroke-dasharray="6 3"/>
  <text x="550" y="358" text-anchor="middle" fill="#4ecdc4" font-size="10" letter-spacing="2">OUTPUT</text>
  <text x="550" y="375" text-anchor="middle" fill="#fff" font-size="13">Complete Production Package — Script + Style Bible + Storyboard + Frames + Review</text>

  <!-- Tech row -->
  <rect x="50" y="410" width="155" height="50" rx="8" fill="#111" stroke="#292929"/>
  <text x="128" y="430" text-anchor="middle" fill="#666" font-size="9" letter-spacing="1">FRONTEND</text>
  <text x="128" y="448" text-anchor="middle" fill="#fff" font-size="12">Next.js 15 + TS</text>

  <rect x="225" y="410" width="155" height="50" rx="8" fill="#111" stroke="#292929"/>
  <text x="303" y="430" text-anchor="middle" fill="#666" font-size="9" letter-spacing="1">STREAMING</text>
  <text x="303" y="448" text-anchor="middle" fill="#fff" font-size="12">Server-Sent Events</text>

  <rect x="400" y="410" width="155" height="50" rx="8" fill="#111" stroke="#292929"/>
  <text x="478" y="430" text-anchor="middle" fill="#666" font-size="9" letter-spacing="1">SDK</text>
  <text x="478" y="448" text-anchor="middle" fill="#fff" font-size="12">@google/genai</text>

  <rect x="575" y="410" width="155" height="50" rx="8" fill="#111" stroke="#292929"/>
  <text x="653" y="430" text-anchor="middle" fill="#666" font-size="9" letter-spacing="1">DEPLOY</text>
  <text x="653" y="448" text-anchor="middle" fill="#fff" font-size="12">Vercel + GCP</text>

  <rect x="750" y="410" width="195" height="50" rx="8" fill="#111" stroke="#292929"/>
  <text x="848" y="430" text-anchor="middle" fill="#666" font-size="9" letter-spacing="1">DATA CONTRACT</text>
  <text x="848" y="448" text-anchor="middle" fill="#fff" font-size="12">Structured JSON</text>

  <!-- Footer -->
  <text x="550" y="500" text-anchor="middle" fill="#444" font-size="11">Bastion Harbor Studios · muse-hackathon.vercel.app · github.com/grepautomation/muse-agent</text>
</svg>
